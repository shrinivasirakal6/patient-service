---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service-deployment
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service-container
          # Matches the image name from the previous build phase
          image: patient-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service-svc
spec:
  type: LoadBalancer
  selector:
    app: patient-service
  ports:
    - port: 80
      targetPort: 8082
